services:
  spondbot:
    build: .
    container_name: spondbot
    restart: unless-stopped
    ports:
      - "8888:8000"
    volumes:
      - ./data:/data
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=1
      # Cloudflare Zero Trust SSO (optional — remove the '#' to enable)
      # - CF_TEAM_DOMAIN=myteam.cloudflareaccess.com
      # - CF_AUD=<audience-tag-from-cf-dashboard>
      # - CF_ADMIN_EMAILS=you@example.com
    networks:
      - bridge
      - proxy
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/dpremoli/SpondBot/refs/heads/main/logo.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8888]"

networks:
  bridge:
    external: true
  proxy:
    external: true
