services:
  spondbot:
    build: .
    container_name: spondbot
    restart: unless-stopped
    ports:
      - "8888:8000"
    volumes:
      - ./data:/data
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=1
      # Cloudflare Zero Trust SSO — set values in a .env file alongside docker-compose.yml
      - CF_TEAM_DOMAIN=${CF_TEAM_DOMAIN:-}
      - CF_AUD=${CF_AUD:-}
      - CF_ADMIN_EMAILS=${CF_ADMIN_EMAILS:-}
    networks:
      - proxy
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/dpremoli/SpondBot/refs/heads/main/logo.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8888]"

networks:
  proxy:
    external: true
