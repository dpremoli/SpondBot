<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot — Settings</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav>
    <a href="/">Events</a>
    <a href="/settings" class="active">Settings</a>
  </nav>
</header>
<main>
  <h1>Settings</h1>

  <section class="card">
    <h2>Defaults</h2>
    <p class="muted">Applied to every selected event unless overridden below.</p>
    <form id="defaults-form">
      <label>Initial delay after invite opens (seconds)
        <input type="number" step="0.05" min="0" id="initial_delay" required />
      </label>
      <label>Retry count (how many extra attempts if the first fails)
        <input type="number" step="1" min="0" id="retry_count" required />
      </label>
      <label>Retry interval (seconds)
        <input type="number" step="0.05" min="0.05" id="retry_interval" required />
      </label>
      <label>Response
        <select id="response">
          <option value="accepted">accepted</option>
          <option value="declined">declined</option>
          <option value="unconfirmed">unconfirmed</option>
        </select>
      </label>
      <button type="submit">Save defaults</button>
      <span id="defaults-status" class="status"></span>
    </form>
  </section>

  <section class="card">
    <h2>Per-event overrides</h2>
    <p class="muted">Anything set here takes precedence over the defaults for that specific event.</p>
    <div id="overrides"></div>
  </section>

  <section class="card">
    <h2>History</h2>
    <p class="muted">Most recent auto-response attempts.</p>
    <table id="history">
      <thead>
        <tr><th>Time</th><th>Event</th><th>Response</th><th>Attempt</th><th>Result</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>
<script src="/static/settings.js"></script>
</body>
</html>
