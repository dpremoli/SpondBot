<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
<script>!function(){var t=localStorage.getItem('__theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}();</script>
</head>
<body>
<header>
  <div class="app-wrap">
    <div class="app-header-inner">
      <a href="/" class="app-brand">SpondBot</a>
      <div class="header-right">
        <button class="ghost small theme-btn" id="theme-btn">🌙</button>
        <div class="nav-account" id="nav-account">
          <button class="ghost small nav-account-btn" id="nav-account-btn"><span class="nav-user"></span><span class="nav-account-caret">▾</span></button>
          <div class="nav-account-menu" id="nav-account-menu" hidden></div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="app-wrap">
  <div class="app-body">
    <aside class="left-nav" id="left-nav" hidden>
      <a href="/" class="ln-item" id="ln-events">📅 Events</a>
      <a href="/admin" class="ln-item" id="ln-dashboard">🛡 Dashboard</a>
      <a href="/logs" class="ln-item" id="ln-logs">📋 Logs</a>
      <a href="/settings" class="ln-item" id="ln-settings">⚙️ Settings</a>
    </aside>

    <main>
      <div class="main-layout">
        <div class="main-content">
          <section class="card">
            <div class="card-header">
              <h2>Events</h2>
              <div class="toolbar">
                <div class="view-toggle" role="group" aria-label="View">
                  <button id="view-list" class="view-btn view-btn--active" title="List view">☰ List</button>
                  <button id="view-cal" class="view-btn" title="Calendar view">📅 Cal</button>
                </div>
                <span class="toolbar-sep"></span>
                <label class="inline toolbar-select-label" id="group-by-label">
                  <span class="toolbar-label-text">Group</span>
                  <select id="group_by">
                    <option value="heading">heading</option>
                    <option value="day">day</option>
                    <option value="week">week</option>
                    <option value="year">year</option>
                  </select>
                </label>
                <label class="inline toolbar-check-label">
                  <input type="checkbox" id="show-past" /> <span>Past</span>
                </label>
                <span class="toolbar-sep"></span>
                <button id="refresh" class="ghost toolbar-icon-btn" title="Refresh events">↺</button>
                <button id="save-selection" class="ghost">Save</button>
                <span id="events-status" class="status"></span>
              </div>
            </div>
            <div id="event-groups"></div>
            <div id="cal-view" hidden></div>
          </section>
        </div>

        <aside class="status-panel-aside">
          <section class="card status-panel" id="status-panel">
            <div class="status-panel-header">
              <span class="dot" id="status-dot"></span>
              <span id="status-text">loading…</span>
              <span id="status-dry" class="tag dry-tag" hidden>DRY RUN</span>
              <button id="status-refresh" class="ghost small status-refresh-btn" title="Refresh now">↺</button>
            </div>
            <div id="status-next-up" class="status-next-up" hidden></div>
          </section>
        </aside>
      </div>
    </main>
  </div>
</div>

<!-- Per-event history modal -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Event history</h2>
        <p id="modal-event-id" class="muted modal-event-id"></p>
      </div>
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
    </div>
    <div id="modal-event-info" class="modal-event-info"></div>
    <div id="modal-actions" class="modal-actions"></div>
    <div id="modal-lifecycle" class="modal-lifecycle"></div>
    <div class="modal-section-label">Bot activity</div>
    <div id="modal-timeline" class="timeline timeline--modal"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <a href="/" class="bottom-nav-item bottom-nav-item--active">
    <span class="bottom-nav-icon">📅</span>
    <span>Events</span>
  </a>
  <a href="/logs" class="bottom-nav-item">
    <span class="bottom-nav-icon">📋</span>
    <span>Logs</span>
  </a>
  <a href="/settings" class="bottom-nav-item">
    <span class="bottom-nav-icon">⚙️</span>
    <span>Settings</span>
  </a>
  <a href="/admin" class="bottom-nav-item" id="bottom-admin" hidden>
    <span class="bottom-nav-icon">🛡</span>
    <span>Dashboard</span>
  </a>
  <button class="bottom-nav-item bottom-nav-item--logout" id="mobile-logout">
    <span class="bottom-nav-icon">⏻</span>
    <span>Logout</span>
  </button>
</nav>

<script src="/static/nav.js"></script>
<script src="/static/timeline.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
