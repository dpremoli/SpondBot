<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav>
    <a href="/" class="active">Events</a>
    <a href="/settings">Settings</a>
  </nav>
</header>
<main>
  <h1>SpondBot</h1>
  <p class="sub">Auto-accept Spond event invites the moment they open.</p>

  <section class="card">
    <h2>Credentials</h2>
    <form id="creds-form">
      <label>Username (email)
        <input type="email" id="username" required autocomplete="username" />
      </label>
      <label>Password
        <input type="password" id="password" required autocomplete="current-password" />
      </label>
      <label>Group IDs (one per line — leave blank for all groups)
        <textarea id="group_ids" rows="3" placeholder="C9DC791FFE63D7914D6952BE10D97B46"></textarea>
      </label>
      <button type="submit">Save &amp; verify</button>
      <span id="creds-status" class="status"></span>
    </form>
  </section>

  <section class="card">
    <div class="card-header">
      <h2>Events</h2>
      <div class="toolbar">
        <button id="refresh">Refresh</button>
        <button id="save-selection">Save selection</button>
        <span id="events-status" class="status"></span>
      </div>
    </div>
    <div id="event-groups"></div>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
