<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav>
    <a href="/" class="active">Events</a>
    <a href="/logs">Logs</a>
    <a href="/settings">Settings</a>
    <span class="nav-spacer"></span>
    <span id="nav-version" class="nav-version"></span>
  </nav>
</header>

<div id="status-bar" class="status-bar">
  <span class="dot" id="status-dot"></span>
  <span id="status-text">loading…</span>
  <span class="spacer"></span>
  <span id="status-next"></span>
  <span id="status-dry" class="tag dry-tag" hidden>DRY RUN</span>
</div>

<div id="upcoming-banner" class="upcoming-banner" hidden>
  <div class="upcoming-inner">
    <span class="upcoming-label">Starting soon</span>
    <span id="upcoming-list"></span>
  </div>
</div>

<main>
  <h1>SpondBot</h1>
  <p class="sub">Auto-accept Spond event invites the moment they open.</p>

  <section class="card">
    <h2>Credentials</h2>
    <form id="creds-form">
      <label>Username (email)
        <input type="email" id="username" required autocomplete="username" />
      </label>
      <label>Password
        <input type="password" id="password" required autocomplete="current-password" />
      </label>
      <label>Group IDs (one per line — leave blank for all groups)
        <textarea id="group_ids" rows="3" placeholder="C9DC791FFE63D7914D6952BE10D97B46"></textarea>
      </label>
      <button type="submit">Save &amp; verify</button>
      <span id="creds-status" class="status"></span>
    </form>
  </section>

  <section class="card">
    <div class="card-header">
      <h2>Events</h2>
      <div class="toolbar">
        <label class="inline">Group by
          <select id="group_by">
            <option value="heading">heading</option>
            <option value="day">day</option>
            <option value="week">week</option>
            <option value="year">year</option>
          </select>
        </label>
        <label class="inline">
          <input type="checkbox" id="show-past" /> show past
        </label>
        <button id="refresh">Refresh</button>
        <button id="save-selection">Save selection</button>
        <span id="events-status" class="status"></span>
      </div>
    </div>
    <div id="event-groups"></div>
  </section>
</main>

<!-- Per-event history modal (shared with logs page) -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Event history</h2>
        <p id="modal-event-id" class="muted modal-event-id"></p>
      </div>
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
    </div>
    <div id="modal-lifecycle" class="modal-lifecycle"></div>
    <div class="modal-section-label">Bot activity</div>
    <div id="modal-timeline" class="timeline timeline--modal"></div>
  </div>
</div>

<script src="/static/timeline.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
