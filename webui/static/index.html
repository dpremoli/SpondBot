<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav id="top-nav" class="top-nav">
    <a href="/" class="active">Events</a>
    <a href="/logs">Logs</a>
    <a href="/settings">Settings</a>
    <a href="/admin" id="nav-admin" hidden>Admin</a>
    <span class="nav-spacer"></span>
    <span id="nav-user" class="nav-user"></span>
    <span id="nav-version" class="nav-version"></span>
    <button id="nav-logout" class="ghost small">Logout</button>
  </nav>
</header>

<div id="upcoming-banner" class="upcoming-banner" hidden>
  <div class="upcoming-inner">
    <span class="upcoming-label">Starting soon</span>
    <span id="upcoming-list"></span>
  </div>
</div>

<main>
  <h1>SpondBot</h1>
  <p class="sub">Auto-accept Spond event invites the moment they open.</p>

  <section class="card status-panel" id="status-panel">
    <div class="status-panel-header">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">loading…</span>
      <span id="status-dry" class="tag dry-tag" hidden>DRY RUN</span>
    </div>
    <div id="status-next-up" class="status-next-up" hidden></div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2>Events</h2>
      <div class="toolbar">
        <div class="view-toggle" role="group" aria-label="View">
          <button id="view-list" class="view-btn view-btn--active" title="List view">☰ List</button>
          <button id="view-cal" class="view-btn" title="Calendar view">📅 Calendar</button>
        </div>
        <label class="inline" id="group-by-label">Group by
          <select id="group_by">
            <option value="heading">heading</option>
            <option value="day">day</option>
            <option value="week">week</option>
            <option value="year">year</option>
          </select>
        </label>
        <label class="inline">
          <input type="checkbox" id="show-past" /> show past
        </label>
        <button id="refresh">Refresh</button>
        <button id="save-selection">Save selection</button>
        <span id="events-status" class="status"></span>
      </div>
    </div>
    <div id="event-groups"></div>
    <div id="cal-view" hidden></div>
  </section>
</main>

<!-- Per-event history modal -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Event history</h2>
        <p id="modal-event-id" class="muted modal-event-id"></p>
      </div>
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
    </div>
    <div id="modal-event-info" class="modal-event-info"></div>
    <div id="modal-actions" class="modal-actions"></div>
    <div id="modal-lifecycle" class="modal-lifecycle"></div>
    <div class="modal-section-label">Bot activity</div>
    <div id="modal-timeline" class="timeline timeline--modal"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <a href="/" class="bottom-nav-item bottom-nav-item--active">
    <span class="bottom-nav-icon">📅</span>
    <span>Events</span>
  </a>
  <a href="/logs" class="bottom-nav-item">
    <span class="bottom-nav-icon">📋</span>
    <span>Logs</span>
  </a>
  <a href="/settings" class="bottom-nav-item">
    <span class="bottom-nav-icon">⚙️</span>
    <span>Settings</span>
  </a>
  <a href="/admin" class="bottom-nav-item" id="bottom-admin" hidden>
    <span class="bottom-nav-icon">🛡</span>
    <span>Admin</span>
  </a>
  <button class="bottom-nav-item bottom-nav-item--logout" id="mobile-logout">
    <span class="bottom-nav-icon">⏻</span>
    <span>Logout</span>
  </button>
</nav>

<script src="/static/nav.js"></script>
<script src="/static/timeline.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
