<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot — Logs</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
<script>!function(){var t=localStorage.getItem('__theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}();</script>
</head>
<body>
<header>
  <div class="app-wrap">
    <div class="app-header-inner">
      <a href="/" class="app-brand">SpondBot</a>
      <div class="header-right">
        <button class="ghost small theme-btn" id="theme-btn">🌙</button>
        <div class="nav-account" id="nav-account">
          <button class="ghost small nav-account-btn" id="nav-account-btn"><span class="nav-user"></span><span class="nav-account-caret">▾</span></button>
          <div class="nav-account-menu" id="nav-account-menu" hidden></div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="app-wrap">
  <div class="app-body">
    <aside class="left-nav" id="left-nav" hidden>
      <a href="/" class="ln-item" id="ln-events">📅 Events</a>
      <a href="/admin" class="ln-item" id="ln-dashboard">🛡 Dashboard</a>
      <a href="/logs" class="ln-item" id="ln-logs">📋 Logs</a>
      <a href="/settings" class="ln-item" id="ln-settings">⚙️ Settings</a>
    </aside>

    <main>
      <div class="page-header">
        <div>
          <h1>Logs</h1>
          <p class="sub">Every auto-response the bot has attempted.</p>
        </div>
        <div class="toolbar">
          <button id="reload">Reload</button>
          <button id="clear-all" class="ghost">Clear all</button>
          <span id="logs-status" class="status"></span>
        </div>
      </div>

      <div class="filter-bar">
        <input type="search" id="filter-text" placeholder="Search by event name…" />
        <div class="filter-pills" role="group" aria-label="Filter by status">
          <button class="pill pill--active" data-status="all">All</button>
          <button class="pill" data-status="accepted">Accepted</button>
          <button class="pill" data-status="waitlisted">Waitlisted</button>
          <button class="pill" data-status="failed">Failed</button>
        </div>
      </div>

      <div id="timeline" class="timeline"></div>
    </main>
  </div>
</div>

<!-- Per-event drill-down modal -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Event history</h2>
        <p id="modal-event-id" class="muted modal-event-id"></p>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button id="modal-clear-event" class="ghost small">Clear this event</button>
        <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      </div>
    </div>
    <div id="modal-lifecycle" class="modal-lifecycle"></div>
    <div class="modal-section-label">Bot activity</div>
    <div id="modal-timeline" class="timeline timeline--modal"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <a href="/" class="bottom-nav-item">
    <span class="bottom-nav-icon">📅</span>
    <span>Events</span>
  </a>
  <a href="/logs" class="bottom-nav-item bottom-nav-item--active">
    <span class="bottom-nav-icon">📋</span>
    <span>Logs</span>
  </a>
  <a href="/settings" class="bottom-nav-item">
    <span class="bottom-nav-icon">⚙️</span>
    <span>Settings</span>
  </a>
  <a href="/admin" class="bottom-nav-item" id="bottom-admin" hidden>
    <span class="bottom-nav-icon">🛡</span>
    <span>Dashboard</span>
  </a>
  <button class="bottom-nav-item bottom-nav-item--logout" id="mobile-logout">
    <span class="bottom-nav-icon">⏻</span>
    <span>Logout</span>
  </button>
</nav>

<script src="/static/nav.js"></script>
<script src="/static/timeline.js"></script>
<script src="/static/logs.js"></script>
</body>
</html>
