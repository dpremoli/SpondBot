<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot — Logs</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav>
    <a href="/">Events</a>
    <a href="/logs" class="active">Logs</a>
    <a href="/settings">Settings</a>
  </nav>
</header>
<main>
  <h1>Logs</h1>
  <p class="sub">Every auto-response the bot has attempted.</p>

  <section class="card">
    <div class="toolbar">
      <button id="reload">Reload</button>
      <span id="logs-status" class="status"></span>
    </div>
    <table id="history">
      <thead>
        <tr>
          <th>Time</th><th>Event</th><th>Response</th><th>Attempt</th><th>Result</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<!-- Per-event drill-down modal -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Event history</h2>
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
    </div>
    <p id="modal-event-id" class="muted" style="font-size:.8rem;margin:0 0 .75rem;"></p>
    <table id="modal-table">
      <thead>
        <tr>
          <th>Time</th><th>Attempt</th><th>Response</th><th>Result</th><th>Detail</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>
<script src="/static/logs.js"></script>
</body>
</html>
