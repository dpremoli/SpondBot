<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpondBot — Logs</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <nav>
    <a href="/">Events</a>
    <a href="/logs" class="active">Logs</a>
    <a href="/settings">Settings</a>
    <span class="nav-spacer"></span>
    <span id="nav-version" class="nav-version"></span>
  </nav>
</header>
<main>
  <div class="page-header">
    <div>
      <h1>Logs</h1>
      <p class="sub">Every auto-response the bot has attempted.</p>
    </div>
    <div class="toolbar">
      <button id="reload">Reload</button>
      <button id="clear-all" class="ghost">Clear all</button>
      <span id="logs-status" class="status"></span>
    </div>
  </div>

  <div class="filter-bar">
    <input type="search" id="filter-text" placeholder="Search by event name…" />
    <div class="filter-pills" role="group" aria-label="Filter by status">
      <button class="pill pill--active" data-status="all">All</button>
      <button class="pill" data-status="accepted">Accepted</button>
      <button class="pill" data-status="waitlisted">Waitlisted</button>
      <button class="pill" data-status="failed">Failed</button>
    </div>
  </div>

  <div id="timeline" class="timeline"></div>
</main>

<!-- Per-event drill-down modal -->
<div id="event-modal" class="modal-backdrop" hidden>
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modal-title">Event history</h2>
        <p id="modal-event-id" class="muted modal-event-id"></p>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button id="modal-clear-event" class="ghost small">Clear this event</button>
        <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      </div>
    </div>
    <div id="modal-lifecycle" class="modal-lifecycle"></div>
    <div class="modal-section-label">Bot activity</div>
    <div id="modal-timeline" class="timeline timeline--modal"></div>
  </div>
</div>

<script src="/static/timeline.js"></script>
<script src="/static/logs.js"></script>
</body>
</html>
